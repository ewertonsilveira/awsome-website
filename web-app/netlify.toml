# netlify.toml — AWSome Painting & Decorating (SPEC-2026-01)
# Hand-authored; do NOT regenerate from the Netlify UI.

# ---------------------------------------------------------------------------
# Build
# base: repo-relative path; Netlify CDs here before running command.
# publish: relative to base; matches TanStack Start's static output directory.
# command: must match package.json "build" so tsc --noEmit runs with the build.
# ---------------------------------------------------------------------------
[build]
  base    = "web-app"
  command = "npm run build"
  publish = "dist/client"

# ---------------------------------------------------------------------------
# Local development (netlify dev)
# port: Vite's dev server runs on 3000; match so `netlify dev` proxies correctly.
# ---------------------------------------------------------------------------
[dev]
  command = "npm run dev"
  port    = 3000

# ---------------------------------------------------------------------------
# Security headers — applied to every route (NFR-05 / AC-12 / AC-13)
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

    # Content-Security-Policy (ADR-03)
    # Rationale per directive:
    #   default-src 'self'          — deny everything not explicitly allowed
    #   script-src 'self' 'unsafe-inline'
    #                               — 'unsafe-inline' is required for TanStack Start's
    #                                 inline hydration-state <script>; cannot use nonces
    #                                 on a static deploy. Revisit if the framework removes
    #                                 the inline state script.
    #   style-src 'self'            — Tailwind v4 is compiled to a linked stylesheet in
    #                                 production (no injected inline <style>)
    #   img-src 'self' data:        — local images + inline SVG data URIs
    #   font-src 'self'             — local fonts only
    #                                 Extension point: add CDN host when web fonts land
    #                                 (e.g. https://fonts.gstatic.com)
    #   connect-src 'self'          — allows the fetch() POST to Netlify Forms (same-origin)
    #   form-action 'self'          — permits the Netlify Forms same-origin POST
    #   frame-ancestors 'none'      — equivalent to X-Frame-Options DENY; belt-and-suspenders
    #   base-uri 'self'             — prevents <base> injection attacks
    #   object-src 'none'           — disables Flash / plugin objects
    #
    # Future extension points (do not edit the header line — append to the relevant directive):
    #   Fonts (FU-03):      font-src += <CDN host>; style-src += <CDN host> if using hosted CSS
    #   Analytics (FU-05):  script-src += <vendor host>; connect-src += <vendor host>
    #   reCAPTCHA (FU-04):  script-src += https://www.google.com https://www.gstatic.com
    #                        frame-src  += https://www.google.com
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'"

# ---------------------------------------------------------------------------
# 404 fallback redirect (ADR-06 / T3 amendment)
# Required until T12 emits dist/client/404.html from the $.tsx catch-all route.
# status=404 preserves the correct HTTP status; NEVER use status=200 here —
# a 200 rewrite would mask prerendered routes and is explicitly forbidden.
# ---------------------------------------------------------------------------
[[redirects]]
  from   = "/*"
  to     = "/404"
  status = 404
