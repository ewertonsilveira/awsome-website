headersOrigin = "config"
redirectsOrigin = "config"
headers = []
redirects = []

[dev]
command = "npm run dev"
targetPort = 3000
port = 8888

[functions]

  [functions.emails]
  included_files = [
    "./emails/**"
  ]

  [functions."*"]

[[plugins]]
origin = "ui"
package = "@netlify/plugin-emails"
pinned_version = "1"

  [plugins.inputs]

[build]
publish = "/opt/build/repo/web-app/dist/client"
publishOrigin = "config"
commandOrigin = "config"
base = "/opt/build/repo/web-app"
command = "vite build"

  [build.environment]

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]